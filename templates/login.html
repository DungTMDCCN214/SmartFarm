<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Đăng nhập - SmartFarm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-green: #2e7d32;
        --secondary-green: #4caf50;
      }
      body {
        background: url("/static/uploads/anh_nen.jpg") no-repeat center center
          fixed;
        background-size: cover;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
      }
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-card {
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 450px;
        width: 100%;
        animation: fadeInUp 0.6s;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo {
        text-align: center;
        margin-bottom: 30px;
      }
      .logo i {
        font-size: 60px;
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .logo h3 {
        color: var(--primary-green);
        margin-top: 10px;
      }
      .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #e0e0e0;
        transition: all 0.3s;
      }
      .form-control:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.25);
      }
      .btn-login {
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1.1rem;
        transition: all 0.3s;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
      }
      .demo-account {
        background: #e8f5e9;
        border-radius: 12px;
        padding: 15px;
        margin-top: 20px;
      }
      .demo-account p {
        margin-bottom: 5px;
      }
      .alert-custom {
        border-radius: 12px;
        font-size: 0.9rem;
        padding: 12px;
        margin-bottom: 20px;
      }
      .input-group-text {
        border-radius: 12px 0 0 12px;
      }
      .form-check-input:checked {
        background-color: var(--primary-green);
        border-color: var(--primary-green);
      }
      @media (max-width: 768px) {
        .login-card {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <i class="fas fa-leaf"></i>
          <h3>SmartFarm</h3>
          <p class="text-muted">Nông nghiệp thông minh</p>
        </div>

        <div id="alertMessage" style="display: none" class="alert-custom"></div>

        <form id="loginForm" onsubmit="login(event)">
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập / Email</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-user text-success"></i
              ></span>
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Nhập email hoặc tên đăng nhập"
                required
              />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-lock text-success"></i
              ></span>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Nhập mật khẩu"
                required
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                onclick="togglePassword()"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" />
            <label class="form-check-label">Ghi nhớ đăng nhập</label>
          </div>
          <button type="submit" class="btn btn-success w-100 btn-login">
            <i class="fas fa-sign-in-alt"></i> Đăng nhập
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="mb-0">
            Chưa có tài khoản?
            <a href="/register" id="registerLink" class="text-success fw-bold"
              >Đăng ký ngay</a
            >
          </p>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = window.location.origin;

      function showAlert(message, type) {
        const alertDiv = document.getElementById("alertMessage");
        alertDiv.className = `alert-custom alert-${type === "success" ? "success" : type === "warning" ? "warning" : "danger"}`;
        alertDiv.innerHTML = `
                <i class="fas ${type === "success" ? "fa-check-circle" : type === "warning" ? "fa-exclamation-triangle" : "fa-times-circle"} me-2"></i>
                ${message}
            `;
        alertDiv.style.display = "block";

        setTimeout(() => {
          alertDiv.style.display = "none";
        }, 3000);
      }

      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
      }

      async function login(event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        if (!username || !password) {
          showAlert("Vui lòng nhập đầy đủ thông tin!", "warning");
          return;
        }

        const submitBtn = document.querySelector(".btn-login");
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password }),
          });

          const data = await response.json();

          if (data.success) {
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("user_id", data.user?.id || data.user_id || 1);
            localStorage.setItem("username", data.user?.username || username);
            localStorage.setItem("fullname", data.user?.fullname || "");

            if (remember) {
              localStorage.setItem("remembered_user", username);
              localStorage.setItem("remembered_pass", password);
            } else {
              localStorage.removeItem("remembered_user");
              localStorage.removeItem("remembered_pass");
            }

            showAlert("Đăng nhập thành công! Đang chuyển hướng...", "success");
            setTimeout(() => {
              window.location.href = "/";
            }, 1000);
          } else {
            showAlert(
              data.message || "Sai tên đăng nhập hoặc mật khẩu!",
              "danger",
            );
          }
        } catch (error) {
          console.error("Login error:", error);
          showAlert(
            "Không thể kết nối đến server. Vui lòng thử lại sau!",
            "danger",
          );
        } finally {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      }

      // Tự động điền tên đăng nhập và mật khẩu đã ghi nhớ
      const rememberedUser = localStorage.getItem("remembered_user");
      const rememberedPass = localStorage.getItem("remembered_pass");
      if (rememberedUser) {
        document.getElementById("username").value = rememberedUser;
        document.getElementById("remember").checked = true;
        if (rememberedPass) {
          document.getElementById("password").value = rememberedPass;
        }
      }

      // Xử lý phím Enter
      document
        .getElementById("loginForm")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            login(e);
          }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
