<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - SmartFarm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-green: #2e7d32;
        --secondary-green: #4caf50;
        --accent-orange: #ffa000;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
      }

      .register-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
      }

      .register-card {
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        animation: fadeInUp 0.6s;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo i {
        font-size: 60px;
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .logo h3 {
        color: var(--primary-green);
        margin-top: 10px;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #e0e0e0;
        transition: all 0.3s;
      }

      .form-control:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.25);
      }

      .btn-register {
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1.1rem;
        transition: all 0.3s;
      }

      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
      }

      .password-strength {
        height: 5px;
        border-radius: 3px;
        margin-top: 8px;
        transition: all 0.3s;
      }

      .strength-weak {
        background: #dc3545;
        width: 33%;
      }
      .strength-medium {
        background: #ffc107;
        width: 66%;
      }
      .strength-strong {
        background: #28a745;
        width: 100%;
      }

      .terms {
        font-size: 0.85rem;
        color: #666;
      }

      .terms a {
        color: var(--primary-green);
        text-decoration: none;
      }

      .social-register {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
      }

      .social-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #ddd;
        transition: all 0.3s;
        text-decoration: none;
        color: #666;
      }

      .social-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
      }

      .alert-custom {
        border-radius: 12px;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .register-card {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <div class="register-card">
        <div class="logo">
          <i class="fas fa-leaf"></i>
          <h3>SmartFarm</h3>
          <p class="text-muted">Đăng ký tài khoản mới</p>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-user text-success"></i
              ></span>
              <input
                type="text"
                id="fullname"
                class="form-control"
                placeholder="Nhập họ tên đầy đủ"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-envelope text-success"></i
              ></span>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="example@email.com"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-id-card text-success"></i
              ></span>
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Chọn tên đăng nhập"
                required
              />
            </div>
            <small class="text-muted">Từ 5-20 ký tự, chỉ chữ và số</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-lock text-success"></i
              ></span>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Nhập mật khẩu"
                required
                onkeyup="checkPasswordStrength()"
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                onclick="togglePassword('password')"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div id="strengthBar" class="password-strength"></div>
            <small class="text-muted">Mật khẩu phải có ít nhất 6 ký tự</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Xác nhận mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-check-circle text-success"></i
              ></span>
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Nhập lại mật khẩu"
                required
              />
            </div>
            <div id="passwordMatch" class="small mt-1"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Số điện thoại (tùy chọn)</label>
            <div class="input-group">
              <span class="input-group-text bg-light"
                ><i class="fas fa-phone text-success"></i
              ></span>
              <input
                type="tel"
                id="phone"
                class="form-control"
                placeholder="Nhập số điện thoại"
              />
            </div>
          </div>

          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="termsCheck"
              required
            />
            <label class="form-check-label terms">
              Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và
              <a href="#">Chính sách bảo mật</a>
            </label>
          </div>

          <button type="submit" class="btn btn-success w-100 btn-register">
            <i class="fas fa-user-plus"></i> Đăng ký
          </button>
        </form>

        <div class="social-register">
          <a href="#" class="social-btn">
            <i class="fab fa-google text-danger"></i>
          </a>
          <a href="#" class="social-btn">
            <i class="fab fa-facebook text-primary"></i>
          </a>
          <a href="#" class="social-btn">
            <i class="fab fa-apple"></i>
          </a>
        </div>

        <div class="text-center mt-4">
          <p class="mb-0">
            Đã có tài khoản?
            <a href="login.html" class="text-success fw-bold">Đăng nhập ngay</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = window.location.origin;

      function checkPasswordStrength() {
        const password = document.getElementById("password").value;
        const strengthBar = document.getElementById("strengthBar");

        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        strengthBar.className = "password-strength";
        if (password.length === 0) {
          strengthBar.style.width = "0";
        } else if (strength <= 2) {
          strengthBar.classList.add("strength-weak");
        } else if (strength <= 3) {
          strengthBar.classList.add("strength-medium");
        } else {
          strengthBar.classList.add("strength-strong");
        }
      }

      function checkPasswordMatch() {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const matchDiv = document.getElementById("passwordMatch");

        if (confirm.length > 0) {
          if (password === confirm) {
            matchDiv.innerHTML =
              '<i class="fas fa-check-circle text-success"></i> Mật khẩu khớp';
            matchDiv.style.color = "#28a745";
            return true;
          } else {
            matchDiv.innerHTML =
              '<i class="fas fa-times-circle text-danger"></i> Mật khẩu không khớp';
            matchDiv.style.color = "#dc3545";
            return false;
          }
        } else {
          matchDiv.innerHTML = "";
          return false;
        }
      }

      function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const type = field.type === "password" ? "text" : "password";
        field.type = type;
      }

      function validateUsername(username) {
        const regex = /^[a-zA-Z0-9]{5,20}$/;
        return regex.test(username);
      }

      function validateEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
      }

      function showAlert(message, type) {
        const existingAlert = document.querySelector(".alert-custom");
        if (existingAlert) existingAlert.remove();

        const alertDiv = document.createElement("div");
        alertDiv.className = `alert alert-${type === "success" ? "success" : type === "warning" ? "warning" : "danger"} alert-custom mt-3`;
        alertDiv.innerHTML = `
          <i class="fas ${type === "success" ? "fa-check-circle" : type === "warning" ? "fa-exclamation-triangle" : "fa-times-circle"}"></i>
          ${message}
        `;

        const form = document.getElementById("registerForm");
        form.parentNode.insertBefore(alertDiv, form.nextSibling);

        setTimeout(() => {
          if (alertDiv) alertDiv.remove();
        }, 3000);
      }

      async function handleRegister(event) {
        event.preventDefault();

        const fullname = document.getElementById("fullname").value.trim();
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const phone = document.getElementById("phone").value.trim();
        const termsChecked = document.getElementById("termsCheck").checked;

        if (!fullname) {
          showAlert("Vui lòng nhập họ và tên!", "warning");
          return;
        }

        if (!validateEmail(email)) {
          showAlert("Vui lòng nhập email hợp lệ!", "warning");
          return;
        }

        if (!validateUsername(username)) {
          showAlert("Tên đăng nhập phải có 5-20 ký tự (chữ và số)!", "warning");
          return;
        }

        if (password.length < 6) {
          showAlert("Mật khẩu phải có ít nhất 6 ký tự!", "warning");
          return;
        }

        if (password !== confirm) {
          showAlert("Mật khẩu xác nhận không khớp!", "warning");
          return;
        }

        if (!termsChecked) {
          showAlert("Vui lòng đồng ý với điều khoản sử dụng!", "warning");
          return;
        }

        const submitBtn = document.querySelector(".btn-register");
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              fullname: fullname,
              username: username,
              email: email,
              phone: phone,
              password: password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            showAlert("Đăng ký thành công! Đang chuyển hướng...", "success");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
          } else {
            showAlert(data.message || "Đăng ký thất bại!", "danger");
          }
        } catch (error) {
          console.error("Register error:", error);
          showAlert("Không thể kết nối đến server!", "danger");
        } finally {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      }

      document
        .getElementById("confirmPassword")
        .addEventListener("keyup", checkPasswordMatch);
      document.getElementById("password").addEventListener("keyup", () => {
        checkPasswordStrength();
        checkPasswordMatch();
      });

      async function checkAlreadyLoggedIn() {
        try {
          const response = await fetch("/api/check_auth");
          const data = await response.json();
          if (data.authenticated) {
            localStorage.setItem("isLoggedIn", "true");
            window.location.href = "/";
          } else {
            localStorage.removeItem("isLoggedIn");
          }
        } catch (e) {
          console.error(e);
        }
      }
      checkAlreadyLoggedIn();
    </script>
  </body>
</html>
